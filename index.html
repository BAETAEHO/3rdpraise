<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3부 찬양팀 로테이션 🎶</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .btn-container { display: flex; justify-content: space-between; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .btn-kakao { background-color: #FEE500; color: #191919; }
        .btn-edit { background-color: #2c3e50; color: white; }
        .btn-save { background-color: #27ae60; color: white; display: none; }
        .btn-add { background-color: #3498db; color: white; width: 100%; margin-top: 10px; padding: 12px; display: none; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        .table-responsive { overflow-x: auto; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; vertical-align: middle; }
        th { background-color: #f8f9fa; white-space: nowrap; }
        input { width: 90%; padding: 6px; box-sizing: border-box; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        textarea { width: 95%; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; resize: vertical; min-height: 50px; font-family: 'Malgun Gothic', sans-serif; font-size: 13px; line-height: 1.4; }
        .setlist-cell { text-align: left; white-space: pre-wrap; font-size: 13px; line-height: 1.5; min-width: 150px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🗓️ 3부 찬양팀 로테이션 🎶</h2>
    
    <div class="btn-container">
        <a href="https://open.kakao.com/o/gpDnEDwi" target="_blank" class="btn btn-kakao">💬 카톡 오픈채팅방</a>
        <div style="display: flex; gap: 5px;">
            <button id="editBtn" class="btn btn-edit" onclick="enterEditMode()">⚙️ 누구나 수정하기</button>
            <button id="saveBtn" class="btn btn-save" onclick="saveToGitHub()">💾 저장 및 카톡 알림 복사</button>
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>날짜</th>
                    <th>메인건반</th>
                    <th>세컨건반</th>
                    <th>베이스</th>
                    <th>기타</th>
                    <th>드럼</th>
                    <th>남자보컬</th>
                    <th>여자보컬</th>
                    <th>찬양 콘티</th>
                    <th id="deleteHeader" style="display: none;">삭제</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="10">데이터를 불러오는 중입니다...</td></tr>
            </tbody>
        </table>
    </div>
    
    <button id="addBtn" class="btn btn-add" onclick="addRow()">+ 다음 주차 일정 추가하기</button>
</div>

<script>
    // =====================================================================
    // 💡 아래 두 항목을 본인의 GitHub 정보로 변경하세요! (따옴표 안에 작성)
    // =====================================================================
    const GITHUB_OWNER = "BAETAEHO"; 
    const GITHUB_REPO = "3rdpraise";         
    const FILE_PATH = "data.json";
    // =====================================================================

    let rotationData = [];
    let isEditMode = false;
    let fileSha = "";

    // 데이터 불러오기
    async function loadData() {
        try {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${FILE_PATH}?t=${Date.now()}`);
            const data = await response.json();
            fileSha = data.sha; 
            
            const decodedContent = decodeURIComponent(escape(window.atob(data.content)));
            rotationData = JSON.parse(decodedContent);
            
            renderTable();
        } catch (error) {
            alert("데이터를 불러오는데 실패했습니다. GITHUB_OWNER와 GITHUB_REPO 값을 정확히 입력했는지 확인해주세요.");
        }
    }

    // 테이블 렌더링
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const deleteHeader = document.getElementById('deleteHeader');
        tbody.innerHTML = "";
        deleteHeader.style.display = isEditMode ? "table-cell" : "none";

        rotationData.forEach((row, index) => {
            const tr = document.createElement('tr');
            if (isEditMode) {
                tr.innerHTML = `
                    <td><input type="text" id="date-${index}" value="${row.date}"></td>
                    <td><input type="text" id="mainKey-${index}" value="${row.mainKey}"></td>
                    <td><input type="text" id="subKey-${index}" value="${row.subKey}"></td>
                    <td><input type="text" id="bass-${index}" value="${row.bass}"></td>
                    <td><input type="text" id="guitar-${index}" value="${row.guitar}"></td>
                    <td><input type="text" id="drum-${index}" value="${row.drum}"></td>
                    <td><input type="text" id="maleVoc-${index}" value="${row.maleVoc}"></td>
                    <td><input type="text" id="femaleVoc-${index}" value="${row.femaleVoc}"></td>
                    <td><textarea id="setlist-${index}" placeholder="콘티를 입력하세요">${row.setlist || ''}</textarea></td>
                    <td><button onclick="deleteRow(${index})" style="background: #e74c3c; color: white; border: none; padding: 5px; cursor: pointer;">X</button></td>
                `;
            } else {
                tr.innerHTML = `
                    <td><strong>${row.date}</strong></td>
                    <td>${row.mainKey}</td>
                    <td>${row.subKey}</td>
                    <td>${row.bass}</td>
                    <td>${row.guitar}</td>
                    <td>${row.drum}</td>
                    <td>${row.maleVoc}</td>
                    <td>${row.femaleVoc}</td>
                    <td class="setlist-cell">${row.setlist || ''}</td>
                `;
            }
            tbody.appendChild(tr);
        });
    }

    // 수정 모드 진입
    function enterEditMode() {
        isEditMode = true;
        document.getElementById('editBtn').style.display = 'none';
        document.getElementById('saveBtn').style.display = 'flex';
        document.getElementById('addBtn').style.display = 'block';
        renderTable();
    }

    function addRow() {
        rotationData.push({ date: "", mainKey: "", subKey: "", bass: "", guitar: "", drum: "", maleVoc: "", femaleVoc: "", setlist: "" });
        renderTable();
    }

    function deleteRow(index) {
        if(confirm("삭제하시겠습니까?")) {
            rotationData.splice(index, 1);
            renderTable();
        }
    }

    // 저장 및 토큰 처리 로직
    async function saveToGitHub() {
        let savedToken = localStorage.getItem('githubPraiseToken');
        
        if (!savedToken) {
            savedToken = prompt("저장을 위한 인증 키(Token)를 입력해 주세요.\n(한 번 입력하면 기기에 저장되어 다음부터는 묻지 않습니다.)");
            if (!savedToken) return; 
        }

        // 인풋창 데이터 모으기
        rotationData.forEach((row, index) => {
            row.date = document.getElementById(`date-${index}`).value;
            row.mainKey = document.getElementById(`mainKey-${index}`).value;
            row.subKey = document.getElementById(`subKey-${index}`).value;
            row.bass = document.getElementById(`bass-${index}`).value;
            row.guitar = document.getElementById(`guitar-${index}`).value;
            row.drum = document.getElementById(`drum-${index}`).value;
            row.maleVoc = document.getElementById(`maleVoc-${index}`).value;
            row.femaleVoc = document.getElementById(`femaleVoc-${index}`).value;
            row.setlist = document.getElementById(`setlist-${index}`).value;
        });

        const jsonString = JSON.stringify(rotationData, null, 2);
        const encodedContent = window.btoa(unescape(encodeURIComponent(jsonString)));

        try {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                method: "PUT",
                headers: {
                    "Authorization": `Bearer ${savedToken}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "웹에서 찬양팀 일정/콘티 업데이트",
                    content: encodedContent,
                    sha: fileSha
                })
            });

            if (response.ok) {
                localStorage.setItem('githubPraiseToken', savedToken);
                alert("성공적으로 원본이 변경되었습니다! (GitHub 반영까지 약 1분 소요될 수 있습니다.)");
                
                const alertText = `[3부 찬양팀 일정 및 콘티 업데이트]\n새로운 일정이나 찬양 콘티가 업데이트 되었습니다.\n웹페이지에 접속하여 확인해 주세요!`;
                navigator.clipboard.writeText(alertText).catch(e => {});

                isEditMode = false;
                document.getElementById('editBtn').style.display = 'flex';
                document.getElementById('saveBtn').style.display = 'none';
                document.getElementById('addBtn').style.display = 'none';
                loadData();
            } else {
                localStorage.removeItem('githubPraiseToken');
                alert("저장 실패! 인증 키(Token)가 틀렸거나 권한이 없습니다. 다시 시도해 주세요.");
            }
        } catch (error) {
            alert("네트워크 오류가 발생했습니다.");
        }
    }

    window.onload = loadData;
</script>

</body>
</html>
