<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3부 찬양팀 로테이션 🎶</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .btn-container { display: flex; justify-content: space-between; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .btn-kakao { background-color: #FEE500; color: #191919; }
        .btn-edit { background-color: #2c3e50; color: white; }
        .btn-save { background-color: #27ae60; color: white; display: none; }
        .btn-add { background-color: #3498db; color: white; width: 100%; margin-top: 10px; padding: 12px; display: none; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        
        /* 테이블 스크롤 컨테이너 */
        .table-responsive { overflow-x: auto; position: relative; padding-bottom: 10px; }
        
        /* 💡 틀 고정 (Sticky) 적용: 항목 이름이 스크롤되어도 왼쪽에 남음 */
        th { 
            background-color: #f8f9fa; 
            font-weight: bold; 
            white-space: nowrap; 
            width: 110px; 
            min-width: 110px; 
            padding: 12px; 
            text-align: center; 
            border-bottom: 1px solid #ddd; 
            border-right: 1px solid #ddd;
            position: sticky; 
            left: 0; 
            z-index: 2; 
            /* 스크롤 시 약간의 그림자를 주어 입체감/구분감 부여 */
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }
        
        td { 
            border-bottom: 1px solid #ddd; 
            border-right: 1px solid #ddd; 
            padding: 10px; 
            text-align: center; 
            font-size: 14px; 
            vertical-align: middle; 
            min-width: 150px; 
        }
        
        /* 테이블 바깥 테두리 처리 */
        tr:first-child th, tr:first-child td { border-top: 1px solid #ddd; }
        th:first-child { border-left: 1px solid #ddd; }
        
        input { width: 90%; padding: 6px; box-sizing: border-box; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        textarea { width: 92%; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; resize: vertical; min-height: 80px; font-family: 'Malgun Gothic', sans-serif; font-size: 13px; line-height: 1.4; }
        
        .setlist-cell { text-align: left; white-space: pre-wrap; font-size: 13px; line-height: 1.5; padding: 12px; }

        /* 이번 주 일정 하이라이트 스타일 */
        .highlight-col { background-color: #e8f5e9 !important; }
        .badge-this-week { background-color: #27ae60; color: white; font-size: 12px; padding: 3px 8px; border-radius: 12px; display: inline-block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🗓️ 3부 찬양팀 로테이션 🎶</h2>
    
    <div class="btn-container">
        <a href="https://open.kakao.com/o/gpDnEDwi" target="_blank" class="btn btn-kakao">💬 카톡 오픈채팅방</a>
        <div style="display: flex; gap: 5px;">
            <button id="editBtn" class="btn btn-edit" onclick="enterEditMode()">⚙️ 수정하기</button>
            <button id="saveBtn" class="btn btn-save" onclick="saveToGitHub()">💾 저장하기</button>
        </div>
    </div>

    <div class="table-responsive" id="tableContainer">
        <table id="rotationTable">
            <tr><td style="text-align: center; padding: 20px; border: none;">데이터를 불러오는 중입니다...</td></tr>
        </table>
    </div>
    
    <button id="addBtn" class="btn btn-add" onclick="addRow()">+ 다음 주차 일정 추가하기</button>
</div>

<script>
    // =====================================================================
    // 💡 아래 두 항목을 본인의 GitHub 정보로 변경하세요!
    // =====================================================================
    const GITHUB_OWNER = "BAETAEHO"; 
    const GITHUB_REPO = "3rdpraise";         
    const FILE_PATH = "data.json";
    // =====================================================================

    let rotationData = [];
    let isEditMode = false;
    let fileSha = "";

    async function loadData() {
        try {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${FILE_PATH}?t=${Date.now()}`);
            const data = await response.json();
            fileSha = data.sha; 
            
            const decodedContent = decodeURIComponent(escape(window.atob(data.content)));
            rotationData = JSON.parse(decodedContent);
            
            renderTable();
        } catch (error) {
            const table = document.getElementById('rotationTable');
            table.innerHTML = "<tr><td style='border: none;'>데이터를 불러오는데 실패했습니다. GitHub 설정을 확인해주세요.</td></tr>";
        }
    }

    function getThisWeekIndex() {
        const today = new Date();
        const currentYear = today.getFullYear();
        today.setHours(0, 0, 0, 0);

        for (let i = 0; i < rotationData.length; i++) {
            if (!rotationData[i].date) continue;
            
            const [month, day] = rotationData[i].date.split('/');
            let colDate = new Date(currentYear, month - 1, day);
            
            const diffDays = Math.ceil((colDate - today) / (1000 * 60 * 60 * 24));
            if (diffDays < -300) { 
                colDate.setFullYear(currentYear + 1);
            }

            const adjustedDiff = Math.ceil((colDate - today) / (1000 * 60 * 60 * 24));
            if (adjustedDiff >= 0 && adjustedDiff <= 6) {
                return i;
            }
        }
        return -1;
    }

    function renderTable() {
        const table = document.getElementById('rotationTable');
        table.innerHTML = ""; 

        if (rotationData.length === 0) {
            table.innerHTML = "<tr><td style='border:none;'>등록된 일정이 없습니다.</td></tr>";
            return;
        }

        const thisWeekIndex = getThisWeekIndex(); 

        const rowStructure = [
            { label: "날짜", key: "date", type: "input" },
            { label: "메인건반", key: "mainKey", type: "input" },
            { label: "세컨건반", key: "subKey", type: "input" },
            { label: "베이스", key: "bass", type: "input" },
            { label: "기타", key: "guitar", type: "input" },
            { label: "드럼", key: "drum", type: "input" },
            { label: "남자보컬", key: "maleVoc", type: "input" },
            { label: "여자보컬", key: "femaleVoc", type: "input" },
            { label: "찬양 콘티", key: "setlist", type: "textarea" }
        ];

        rowStructure.forEach(config => {
            const tr = document.createElement('tr');
            const th = document.createElement('th');
            th.innerText = config.label;
            tr.appendChild(th);

            rotationData.forEach((row, index) => {
                const td = document.createElement('td');
                
                if (index === thisWeekIndex) {
                    td.classList.add('highlight-col');
                }
                
                if (isEditMode) {
                    if (config.type === "textarea") {
                        const textarea = document.createElement('textarea');
                        textarea.id = `${config.key}-${index}`;
                        textarea.value = row[config.key] || "";
                        textarea.placeholder = "찬양 곡 목록 입력";
                        td.appendChild(textarea);
                    } else {
                        const input = document.createElement('input');
                        input.type = "text";
                        input.id = `${config.key}-${index}`;
                        input.value = row[config.key] || "";
                        td.appendChild(input);
                    }
                } else {
                    if (config.key === "date") {
                        if (index === thisWeekIndex) {
                            td.innerHTML = `<strong style="color: #27ae60; font-size: 16px;">${row[config.key]}</strong><br><span class="badge-this-week">이번 주</span>`;
                        } else {
                            td.innerHTML = `<strong>${row[config.key]}</strong>`;
                        }
                    } else if (config.key === "setlist") {
                        td.className += " setlist-cell";
                        td.innerText = row[config.key] || "";
                    } else {
                        td.innerText = row[config.key] || "";
                    }
                }
                tr.appendChild(td);
            });
            table.appendChild(tr);
        });

        if (isEditMode) {
            const deleteTr = document.createElement('tr');
            const deleteTh = document.createElement('th');
            deleteTh.innerText = "일정 관리";
            deleteTr.appendChild(deleteTh);

            rotationData.forEach((row, index) => {
                const td = document.createElement('td');
                if (index === thisWeekIndex) td.classList.add('highlight-col');
                td.innerHTML = `<button onclick="deleteRow(${index})" style="background: #e74c3c; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold;">해당 주차 삭제</button>`;
                deleteTr.appendChild(td);
            });
            table.appendChild(deleteTr);
        }

        // 💡 렌더링 직후 '이번 주' 위치로 자동 스크롤
        setTimeout(() => {
            if (!isEditMode && thisWeekIndex !== -1) {
                const container = document.getElementById('tableContainer');
                // (항목 이름 너비 110px * 인덱스) + 여백 계산하여 스크롤 이동
                const scrollPosition = (thisWeekIndex * 150) - 50; 
                if (container) {
                    container.scrollTo({ left: Math.max(0, scrollPosition), behavior: 'smooth' });
                }
            }
        }, 100);
    }

    function enterEditMode() {
        isEditMode = true;
        document.getElementById('editBtn').style.display = 'none';
        document.getElementById('saveBtn').style.display = 'flex';
        document.getElementById('addBtn').style.display = 'block';
        renderTable();
    }

    function addRow() {
        rotationData.push({ date: "", mainKey: "", subKey: "", bass: "", guitar: "", drum: "", maleVoc: "", femaleVoc: "", setlist: "" });
        renderTable();
    }

    function deleteRow(index) {
        if(confirm("선택하신 주차의 모든 로테이션 일정을 삭제하시겠습니까?")) {
            rotationData.splice(index, 1);
            renderTable();
        }
    }

    async function saveToGitHub() {
        let savedToken = localStorage.getItem('githubPraiseToken');
        
        if (!savedToken) {
            savedToken = prompt("저장을 위한 인증 키(Token)를 입력해 주세요.\n(최초 1회만 입력하면 이 기기에 안전하게 저장됩니다.)");
            if (!savedToken) return; 
        }

        rotationData.forEach((row, index) => {
            row.date = document.getElementById(`date-${index}`).value;
            row.mainKey = document.getElementById(`mainKey-${index}`).value;
            row.subKey = document.getElementById(`subKey-${index}`).value;
            row.bass = document.getElementById(`bass-${index}`).value;
            row.guitar = document.getElementById(`guitar-${index}`).value;
            row.drum = document.getElementById(`drum-${index}`).value;
            row.maleVoc = document.getElementById(`maleVoc-${index}`).value;
            row.femaleVoc = document.getElementById(`femaleVoc-${index}`).value;
            row.setlist = document.getElementById(`setlist-${index}`).value;
        });

        const jsonString = JSON.stringify(rotationData, null, 2);
        const encodedContent = window.btoa(unescape(encodeURIComponent(jsonString)));

        try {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                method: "PUT",
                headers: {
                    "Authorization": `Bearer ${savedToken}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "웹에서 찬양팀 로테이션 및 콘티 업데이트",
                    content: encodedContent,
                    sha: fileSha
                })
            });

            if (response.ok) {
                localStorage.setItem('githubPraiseToken', savedToken);
                alert("성공적으로 저장되었습니다! 변경 사항이 사이트에 반영되기까지 약 1분 정도 소요될 수 있습니다.");

                isEditMode = false;
                document.getElementById('editBtn').style.display = 'flex';
                document.getElementById('saveBtn').style.display = 'none';
                document.getElementById('addBtn').style.display = 'none';
                loadData();
            } else {
                localStorage.removeItem('githubPraiseToken');
                alert("저장 실패! 인증 키(Token)가 올바르지 않거나 권한이 없습니다.");
            }
        } catch (error) {
            alert("네트워크 오류가 발생했습니다.");
        }
    }

    window.onload = loadData;
</script>

</body>
</html>
